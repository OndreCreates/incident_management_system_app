name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_DATABASE: incident_management
          MYSQL_USER: incident_app
          MYSQL_PASSWORD: incident_app
          MYSQL_ROOT_PASSWORD: root
        # application.yml's default datasource URL points at localhost:3308 --
        # matches the docker-compose service too, so no env override is needed here.
        ports:
          - 3308:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  admin-panel:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin-panel/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        # Placeholder values -- Next.js executes route/page modules while tracing the
        # standalone build and lib/config.ts throws if these are unset. Nothing here is
        # baked into the output; real values come from the deploy environment.
        env:
          IDENTITY_SERVER_ISSUER: http://localhost:9000
          OAUTH_CLIENT_ID: incident-admin-panel
          OAUTH_CLIENT_SECRET: ci-placeholder
          OAUTH_REDIRECT_URI: http://localhost:3001/callback
          INCIDENT_API_URL: http://localhost:8080
        run: npm run build
