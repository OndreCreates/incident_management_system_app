spring:
  application:
    name: incident-management-app

  datasource:
    url: jdbc:mysql://localhost:3308/incident_management
    username: incident_app
    password: incident_app
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # localhost funguje pro lokální mvn spring-boot:run; ve Fázi 1G, až
          # poběží v docker-compose vedle identity-serveru, se přepne přes
          # JWKS_URI env proměnnou na http://identity-server:9000/oauth2/jwks
          jwk-set-uri: ${JWKS_URI:http://localhost:9000/oauth2/jwks}

notification:
  # notification_center_app defaults to :8080 too -- when running both locally
  # outside Docker, run one of them on a different port. Verified contract
  # (POST /api/v1/notifications, X-API-Key) against the real running service,
  # see README.
  api-url: ${NOTIFICATION_API_URL:http://localhost:8081}
  # No safe default: a per-client secret issued by notification_center_app's
  # admin API. Escalation emails are skipped (logged, not fatal) when unset.
  api-key: ${NOTIFICATION_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health
